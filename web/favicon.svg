<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#f5d442"/>
  <!-- Stylised Mandelbrot silhouette: large cardioid approximated as a
       circle, plus the period-2 bulb to its left. At favicon resolution
       this reads more cleanly than a real cardioid path. -->
