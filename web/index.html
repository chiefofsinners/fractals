<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mandelbrot (Rust + WASM)</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #111; color: #eee;
        font-family: system-ui, sans-serif; overflow: hidden;
        -webkit-text-size-adjust: 100%; }
      body { display: flex; flex-direction: column; height: 100vh;
        height: 100dvh; padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box; }
      header { padding: 0.5rem 1rem; display: flex; gap: 1rem; align-items: center;
        flex-wrap: wrap; border-bottom: 1px solid #222; flex: 0 0 auto; }
      header h1 { font-size: 1rem; margin: 0; font-weight: 600; }
      header label { font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.3rem; }
      header input[type="number"], header select, header button {
        font: inherit; min-height: 1.8rem; }
      header input[type="number"] { width: 6rem; }
      header button { padding: 0.25rem 0.6rem; }
      #status { font-size: 0.8rem; opacity: 0.75; margin-left: auto; }
      main { flex: 1 1 auto; position: relative; overflow: hidden;
        touch-action: none; }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%;
        display: block; cursor: crosshair; }
      #canvas { background: #000; image-rendering: pixelated;
        image-rendering: crisp-edges; }
      #gpu, #webgpu { background: #000; }
      #axes { pointer-events: none; background: transparent; }
      .hint { position: absolute; left: 0.75rem; bottom: 0.5rem;
        font-size: 0.75rem; opacity: 0.6; pointer-events: none;
        text-shadow: 0 1px 2px #000; margin: 0; }

      /* --- Mobile / narrow viewports ------------------------------------ */
      /* Bigger tap targets, hide the long title to free horizontal space,
         drop the status bar to a second line, and shorten the hint to
         something touch-relevant. */
      @media (max-width: 720px), (pointer: coarse) {
        header { padding: 0.4rem 0.6rem; gap: 0.5rem 0.75rem;
          row-gap: 0.4rem; }
        header h1 { display: none; }
        header label { font-size: 0.95rem; }
        header input[type="number"], header select, header button {
          font-size: 1rem; min-height: 2.25rem;
          padding: 0.35rem 0.55rem;
          border-radius: 0.4rem;
          background: #1d1d1d; color: inherit;
          border: 1px solid #333;
        }
        header input[type="number"] { width: 4.5rem; }
        /* Larger checkbox via a wrapping touch area. */
        header input[type="checkbox"] {
          width: 1.25rem; height: 1.25rem;
        }
        #status { font-size: 0.75rem; flex-basis: 100%;
          margin-left: 0; opacity: 0.6; }
        .hint { font-size: 0.7rem; left: 0.5rem; bottom: 0.3rem; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Mandelbrot · Rust + WebAssembly</h1>
      <label>Iter
        <input id="iter" type="number" min="32" max="10000" step="32" value="512" inputmode="numeric" />
      </label>
      <label><input id="showAxes" type="checkbox" /> Axes</label>
      <label>Renderer
        <select id="renderer">
          <option value="webgpu" selected>WebGPU (perturbation)</option>
          <option value="webgl">WebGL (f32)</option>
          <option value="cpu">CPU (Rust f64)</option>
        </select>
      </label>
      <button id="reset">Reset</button>
      <span id="status">loading…</span>
    </header>
    <main>
      <canvas id="webgpu"></canvas>
      <canvas id="gpu"></canvas>
      <canvas id="canvas"></canvas>
      <canvas id="axes"></canvas>
      <p class="hint">Tap/pinch to zoom · drag to pan · shift-click to zoom out</p>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
